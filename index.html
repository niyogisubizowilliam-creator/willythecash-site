<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willythecash Movies</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #141414;
            color: white;
        }

        header {
            background-color: #000;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            color: #E50914;
            margin: 0;
            font-size: 28px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #E50914;
        }

        .banner {
            position: relative;
            background: url('https://via.placeholder.com/1200x400?text=Featured+Movie') center/cover no-repeat;
            height: 400px;
            display: flex;
            align-items: flex-end;
            padding: 20px 30px;
        }

        .banner h2 {
            font-size: 36px;
            margin: 0;
            text-shadow: 2px 2px 10px black;
        }

        .row {
            padding: 20px 30px;
        }

        .row h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .movies {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .movies::-webkit-scrollbar {
            display: none;
        }

        .movie {
            position: relative;
            min-width: 150px;
            height: 220px;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .movie img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie:hover {
            transform: scale(1.1);
            z-index: 2;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(229, 9, 20, 0.8);
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie:hover .play-button {
            opacity: 1;
        }

        .download-btn {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #E50914;
            color: white;
            font-size: 12px;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            opacity: 0.9;
        }

        .download-btn:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .banner h2 { font-size: 28px; }
            .movie { min-width: 120px; height: 180px; }
            .play-button { width: 40px; height: 40px; }
        }
    </style>
</head>
